name: echo

x-runtime-environment: &runtime-environment
  ENVIRONMENT: ${ENVIRONMENT:-development}
  EXECUTION_PROFILE: ${EXECUTION_PROFILE:-mock}
  ALLOW_PAID_EXECUTION: ${ALLOW_PAID_EXECUTION:-false}
  REDIS_URL: redis://redis:6379/0
  JOB_REDIS_URL: redis://redis:6379/1
  CELERY_BROKER_URL: redis://redis:6379/2
  CELERY_RESULT_BACKEND: redis://redis:6379/3
  STORAGE_BACKEND: local
  STORAGE_LOCAL_ROOT: /app/shared-storage
  SESSION_TTL_SECONDS: "86400"
  JOB_TTL_SECONDS: "86400"
  MAX_UPLOAD_BYTES: "104857600"
  MAX_AUDIO_DURATION_SECONDS: "600"
  TASK_SOFT_TIME_LIMIT_SECONDS: "3300"
  TASK_TIME_LIMIT_SECONDS: "3600"
  MOCK_JOB_SCENARIO: ${MOCK_JOB_SCENARIO:-success}
  MOCK_JOB_DELAY_SECONDS: ${MOCK_JOB_DELAY_SECONDS:-0}
  ENABLE_LEGACY_SYNC_INFERENCE: "false"
  HF_HOME: /home/appuser/.cache/huggingface
  PYTHONUNBUFFERED: "1"

x-worker-common: &worker-common
  working_dir: /app
  environment:
    <<: *runtime-environment
    ML_DEVICE: auto
  volumes:
    - ./Backend/app:/app/app
    - ./Backend/shared-storage:/app/shared-storage
    - hf-cache:/home/appuser/.cache/huggingface
  depends_on:
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  redis:
    image: redis:7-alpine
    container_name: echo-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      args:
        ROLE: api
        VARIANT: cpu
    container_name: echo-api
    working_dir: /app
    environment:
      <<: *runtime-environment
      ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
    volumes:
      - ./Backend/app:/app/app
      - ./Backend/data:/app/data:ro
      - ./Backend/uploads:/app/uploads
      - ./Backend/shared-storage:/app/shared-storage
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/app"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  worker-cpu:
    <<: *worker-common
    container_name: echo-worker-cpu
    build:
      context: ./Backend
      dockerfile: Dockerfile
      args:
        ROLE: worker
        VARIANT: cpu
    profiles: [real]
    command: ["celery", "-A", "app.core.celery_app:celery_app", "worker", "--loglevel=INFO", "--queues=cpu", "--concurrency=2", "--prefetch-multiplier=1"]

  worker-mock:
    container_name: echo-worker-mock
    build:
      context: ./Backend
      dockerfile: Dockerfile
      args:
        ROLE: api
        VARIANT: cpu
    profiles: [mock]
    working_dir: /app
    environment:
      <<: *runtime-environment
    volumes:
      - ./Backend/app:/app/app
      - ./Backend/shared-storage:/app/shared-storage
    depends_on:
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.core.celery_app:celery_app", "worker", "--loglevel=INFO", "--queues=mock,cpu", "--pool=solo", "--concurrency=1", "--prefetch-multiplier=1"]
    restart: unless-stopped

  worker-model-local:
    <<: *worker-common
    container_name: echo-worker-model-local
    build:
      context: ./Backend
      dockerfile: Dockerfile
      args:
        ROLE: worker
        VARIANT: cpu
    profiles: [cpu-model]
    command: ["celery", "-A", "app.core.celery_app:celery_app", "worker", "--loglevel=INFO", "--queues=gpu-fast,gpu-large", "--concurrency=1", "--prefetch-multiplier=1"]

  scheduler:
    <<: *worker-common
    container_name: echo-scheduler
    build:
      context: ./Backend
      dockerfile: Dockerfile
      args:
        ROLE: api
        VARIANT: cpu
    command: ["celery", "-A", "app.core.celery_app:celery_app", "beat", "--loglevel=INFO"]

  worker-gpu:
    <<: *worker-common
    container_name: echo-worker-gpu
    build:
      context: ./Backend
      dockerfile: Dockerfile
      args:
        ROLE: worker
        VARIANT: gpu
    profiles: [gpu]
    command: ["celery", "-A", "app.core.celery_app:celery_app", "worker", "--loglevel=INFO", "--queues=gpu-fast,gpu-large", "--concurrency=1", "--prefetch-multiplier=1"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  worker-amd:
    <<: *worker-common
    container_name: echo-worker-amd
    build:
      context: ./Backend
      dockerfile: Dockerfile
      args:
        ROLE: worker
        VARIANT: rocm
    profiles: [amd]
    command: ["celery", "-A", "app.core.celery_app:celery_app", "worker", "--loglevel=INFO", "--queues=gpu-fast,gpu-large", "--concurrency=1", "--prefetch-multiplier=1"]
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add: [video]
    ipc: host
    security_opt: [seccomp=unconfined]

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      target: dev
    container_name: echo-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./Frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  hf-cache:
  frontend-node-modules:
